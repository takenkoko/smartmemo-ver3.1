<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}SmartMemo{% endblock %}</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            
            <div class="container">
                <a class="navbar-brand" href="/">
                    SmartMemo
                </a>

                <div class="navbar-nav ms-5 me-3">
                    <a class="nav-link" href="/">HOME</a>
                    <a class="nav-link" href="/create/">NEW MEMO</a>
                </div>
                
                 <form class="d-flex ms-auto" method="GET" action="/search/">
                    <input 
                       class="form-control me-2"
                       type="search"
                       name="keyword"
                       placeholder="検索">
                    
                    <button class="btn btn-outline-light" type="submit">
                        Search
                    </button>
                </form>
                
                <form action="{% url 'user_logout' %}" method="post" class="ms-3 mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light">
                        LOGOUT
                    </button>
                </form>
                

               
            </div>
        </nav>
            

        <div class="container mt-5">

            {% block content %}
            {% endblock %}
        </div>
    </body>

</html>
